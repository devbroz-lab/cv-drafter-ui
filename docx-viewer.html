<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCX Structural Locator Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: white;
        }

        .document {
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* Paragraph styling */
        .paragraph {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            background: #fafafa;
        }

        .paragraph:hover {
            background: #e8f4f8;
            border-left-color: #667eea;
            box-shadow: 0 2px 4px rgba(102, 126, 234, 0.1);
        }

        .paragraph.selected {
            background: #e0e7ff;
            border-left-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        /* Table styling */
        .table-wrapper {
            margin: 24px 0;
            overflow-x: auto;
            padding: 12px;
            border-radius: 4px;
            background: #fafafa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        td {
            border: 1px solid #ddd;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        td:hover {
            background: #e8f4f8;
            box-shadow: inset 0 0 8px rgba(102, 126, 234, 0.1);
        }

        td.selected {
            background: #e0e7ff;
            box-shadow: inset 0 0 8px rgba(102, 126, 234, 0.2);
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: white;
            border-left: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -2px 0 8px rgba(0,0,0,0.05);
        }

        .sidebar h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #667eea;
        }

        .locator-box {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
            margin-bottom: 16px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            word-break: break-all;
        }

        .locator-box pre {
            margin: 0;
            white-space: pre-wrap;
            color: #333;
        }

        .locator-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .placeholder {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 40px 20px;
        }

        .copy-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .feedback {
            color: #667eea;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid #ddd;
                max-height: 30vh;
            }

            .content-area {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="header">
                <h1>📄 DOCX Structural Locator Viewer</h1>
                <p>Click any paragraph or table cell to see its structural XML locator · loads <code>sample_test.docx</code></p>
                <p id="loadStatus" style="font-size:12px;margin-top:8px;opacity:0.95;"></p>
                <p style="font-size:12px;margin-top:6px;opacity:0.9;"><label>Open file: <input type="file" id="docxFile" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document"></label></p>
            </div>
            <div class="content-area">
                <div class="document" id="document"></div>
            </div>
        </div>

        <div class="sidebar">
            <h2>📍 Locator Info</h2>
            <div class="placeholder" id="placeholder">
                Click on any element to view its structural locator
            </div>
            <div id="locatorContainer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        const WP_NS = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';
        const DOCX_URL = 'sample_test.docx';

        const parser = new DOMParser();
        /** @type {Document|null} */
        let xmlDoc = null;

        function setStatus(message, isError) {
            const el = document.getElementById('loadStatus');
            if (!el) return;
            el.textContent = message;
            el.style.color = isError ? '#ffdddd' : 'inherit';
        }

        async function parseDocxArrayBuffer(ab) {
            const zip = await JSZip.loadAsync(ab);
            const file = zip.file('word/document.xml');
            if (!file) throw new Error('ZIP has no word/document.xml');
            return file.async('string');
        }

        async function loadDocxBuffer(ab) {
            const xmlString = await parseDocxArrayBuffer(ab);
            xmlDoc = parser.parseFromString(xmlString, 'text/xml');
            const err = xmlDoc.querySelector('parsererror');
            if (err) throw new Error('Invalid word/document.xml: ' + (err.textContent || 'parse error'));
            renderDocument();
            setStatus('Loaded document.xml from DOCX.', false);
        }

        async function loadDocxFromUrl(url) {
            setStatus('Loading ' + url + '…', false);
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
                await loadDocxBuffer(await res.arrayBuffer());
            } catch (e) {
                const msg =
                    String(e.message || e) +
                    '. If you opened this page as file://, use “Open file” below or serve the folder with a local HTTP server (e.g. python3 -m http.server).';
                setStatus(msg, true);
                showDocumentError(msg);
            }
        }

        function showDocumentError(message) {
            const container = document.getElementById('document');
            container.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'placeholder';
            div.textContent = message;
            container.appendChild(div);
        }

        // Extract text from Word elements properly
        function extractWordText(elem) {
            let text = '';
            for (let child of elem.childNodes) {
                if (child.nodeName.includes(':t') || child.localName === 't') {
                    text += child.textContent;
                } else if (child.nodeType === 1) {
                    text += extractWordText(child);
                }
            }
            return text;
        }

        function wpChildElements(el, localName) {
            return Array.from(el.children).filter(
                (c) => c.nodeType === 1 && c.namespaceURI === WP_NS && c.localName === localName
            );
        }

        // Parse document structure (preserves paragraph / table order in the body)
        function parseDocument() {
            const result = { blocks: [] };

            if (!xmlDoc) {
                result.blocks = [];
                return result;
            }

            const bodies = xmlDoc.getElementsByTagNameNS(WP_NS, 'body');
            const body = bodies[0];
            if (!body) return result;

            let parCount = 0;
            let tableCount = 0;

            for (const elem of body.children) {
                if (elem.nodeType !== 1 || elem.namespaceURI !== WP_NS) continue;

                if (elem.localName === 'p') {
                    const text = extractWordText(elem);
                    result.blocks.push({
                        kind: 'paragraph',
                        paragraphIndex: parCount,
                        text,
                        element: elem
                    });
                    parCount++;
                } else if (elem.localName === 'tbl') {
                    result.blocks.push({
                        kind: 'table',
                        tableIndex: tableCount,
                        table: parseTable(elem, tableCount)
                    });
                    tableCount++;
                }
            }

            return result;
        }

        // Parse table structure
        function parseTable(tableElem, tableIndex) {
            const rows = wpChildElements(tableElem, 'tr');
            const tableData = {
                index: tableIndex,
                rows: []
            };

            let rowIndex = 0;
            for (let rowElem of rows) {
                const cells = wpChildElements(rowElem, 'tc');
                const rowData = {
                    index: rowIndex,
                    cells: []
                };

                let cellIndex = 0;
                for (let cellElem of cells) {
                    const text = extractWordText(cellElem);
                    rowData.cells.push({
                        index: cellIndex,
                        text: text,
                        element: cellElem
                    });
                    cellIndex++;
                }

                tableData.rows.push(rowData);
                rowIndex++;
            }

            return tableData;
        }

        // Render document to HTML (same order as in document.xml body)
        function renderDocument() {
            const container = document.getElementById('document');
            container.innerHTML = '';

            if (!xmlDoc) {
                showDocumentError('No document loaded yet.');
                return;
            }

            const doc = parseDocument();

            for (const block of doc.blocks) {
                if (block.kind === 'paragraph') {
                    if (!block.text || !block.text.trim()) continue;
                    const pi = block.paragraphIndex;
                    const div = document.createElement('div');
                    div.className = 'paragraph';
                    div.textContent = block.text;
                    div.dataset.type = 'paragraph';
                    div.dataset.paragraphIndex = String(pi);
                    div.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showLocator(
                            {
                                location: 'paragraph',
                                paragraph_index: pi,
                                text_content: block.text
                            },
                            e.target
                        );
                    });
                    container.appendChild(div);
                } else if (block.kind === 'table') {
                    const table = block.table;
                    const tableWrapper = document.createElement('div');
                    tableWrapper.className = 'table-wrapper';
                    const tableElem = document.createElement('table');

                    for (const row of table.rows) {
                        const tr = document.createElement('tr');
                        for (const cell of row.cells) {
                            const td = document.createElement('td');
                            td.textContent = cell.text || '(empty)';
                            td.dataset.type = 'table';
                            td.dataset.tableIndex = String(table.index);
                            td.dataset.rowIndex = String(row.index);
                            td.dataset.cellIndex = String(cell.index);

                            td.addEventListener('click', (e) => {
                                e.stopPropagation();
                                showLocator(
                                    {
                                        location: 'table',
                                        table_index: table.index,
                                        row_index: row.index,
                                        cell_index: cell.index,
                                        text_content: cell.text
                                    },
                                    e.target
                                );
                            });

                            tr.appendChild(td);
                        }
                        tableElem.appendChild(tr);
                    }

                    tableWrapper.appendChild(tableElem);
                    container.appendChild(tableWrapper);
                }
            }
        }

        // Show locator in sidebar
        function showLocator(locatorData, element) {
            const container = document.getElementById('locatorContainer');
            const placeholder = document.getElementById('placeholder');

            // Clear previous selection
            document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            // Hide placeholder
            placeholder.style.display = 'none';

            // Build locator JSON
            const locatorJSON = JSON.stringify(locatorData, null, 2);

            // Create locator box
            container.innerHTML = `
                <div class="locator-label">Structural Locator</div>
                <div class="locator-box">
                    <pre>${escapeHtml(locatorJSON)}</pre>
                </div>
                <button type="button" class="copy-btn" id="copyLocatorBtn">📋 Copy JSON</button>
                <div class="feedback" id="feedback">Copied!</div>
            `;
            container.querySelector('#copyLocatorBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(locatorJSON).then(() => {
                    const feedback = document.getElementById('feedback');
                    feedback.classList.add('show');
                    setTimeout(() => feedback.classList.remove('show'), 2000);
                });
            });
        }

        // Escape HTML for display
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('docxFile').addEventListener('change', async (ev) => {
                const f = ev.target.files && ev.target.files[0];
                if (!f) return;
                setStatus('Reading ' + f.name + '…', false);
                try {
                    await loadDocxBuffer(await f.arrayBuffer());
                } catch (e) {
                    const msg = String(e.message || e);
                    setStatus(msg, true);
                    showDocumentError(msg);
                }
            });
            loadDocxFromUrl(DOCX_URL);
        });
    </script>
</body>
</html>
